{% load static %}
<style>
    .fixed-popup {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 50%;
        height: auto;

        background-color: white;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        align-items: center;
        /* 垂直居中 */
        z-index: 1000;
        /* 确保浮窗在顶层 */
        border-radius: 20px;
    }

    .close-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        font-size: 24px;
        cursor: pointer;
        color: #333;
        user-select: none;
        display: none;
        /* 防止文本被选中 */
    }

    .popup-content {
        border-radius: 10px;
        display: none;
        width: 100%;
        height: 100%;
        flex-direction: column;
        background-color: #F4F0ED;
        padding: 30px;
    }

    .left-side,
    .right-side {
        display: flex;
        flex-direction: column;

        align-items: center;
        /* 水平居中（对于图片很有用） */
    }

    .left-side img {
        max-width: 100%;
        max-height: 100%;
        object-fit: cover;
        /* 保持图片比例 */
        padding: 30px;
    }

    .right-side {
        flex: 1;
        /* 右侧占据剩余空间 */
        padding-right: 30px;
        padding-top: 30px;
        text-align: center;
        /* 文字居中 */
    }

    .overlay2 {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.7);
        /* 灰色半透明 */
        z-index: 999;
        /* 确保在内容之上但低于弹窗 */
        display: none;
        /* 初始时隐藏 */
    }

    /* 当屏幕宽度小于某个值时（比如600px，认为是移动端），隐藏弹窗 */
    @media (max-width: 990px) {

        .fixed-popup {
            width: 80%;
            height: 80%;
        }

    }

    .orange-button {
        background-color: orange;
        color: white;
        border: none;
        /* 移除边框 */
        padding: 10px 20px;
        border-radius: 10px;
        cursor: pointer;
        /* 鼠标悬停时显示手指形状 */
        text-decoration: none;
        /* 虽然button默认没有下划线，但明确写出有助于理解 */
        transition: color 0.3s ease;
        /* 平滑过渡效果 */
        margin-top: auto;
        margin-bottom: 30px;
        width: 100%;
        background-color: #000;
    }

    .orange-button:hover {
        background-color: #f92;

    }

    /* 可以根据需要添加更多的CSS样式 */
</style>

<div id="overlay2" class="overlay2" style="display:none;"></div>

    <div class="popup-content" id="fixedPopup2">
        <h1>🌟关注公众号，发送“激活码”🌟</h1>
        <h2>扫码获取今天的激活码即可免费使用！</h2>

        <button class="orange-button" onclick="activate()">激活</button>

<script>
    function setCookie(name, value, days = 365, path = '/') {
        let expires = '';
        if (days) {
            const date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            expires = `; expires=${date.toUTCString()}`;
        }
        document.cookie = `${name}=${encodeURIComponent(value)}${expires}; path=${path}`;
    }

    function scrollToTop() {
        window.scrollTo({
            top: 0,
            behavior: 'smooth' // 平滑滚动到顶部  
        });
    }
    function activate() {
        fetch('/getCode/')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP 错误! 状态码: ${response.status}`);
                }
                return response.json(); // 解析 JSON 数据
            })
            .then(data => {
                var code = document.getElementById('code').value;
                if (code == data["code"]) {
                    setCookie('activate', 'true', 7, '/');
                    var popup = document.getElementById('fixedPopup');
                    popup.style.display = 'none';
                    var overlay = document.getElementById('overlay2');
                    overlay.style.display = 'none';
                    document.querySelector('.close-btn').style.display = 'none';
                    scrollToTop();
                } else {
                    alert('激活码错误！');
                }
            })
            .catch(error => {
                console.error('请求失败:', error);
            });

    }
</script>
